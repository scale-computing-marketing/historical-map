<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Historical Wars Explorer — American Revolutionary War</title>
<link rel="stylesheet" href="app/styles.css">
</head>
<body>
<div id="app">

  <!-- TOP BAR -->
  <header id="topbar" class="ui">
    <div class="brand"><small>Historical Wars Explorer</small>American Revolutionary War</div>
    <div class="searchbox">
      <input id="search" type="text" placeholder="Search countries, battles, leaders, years…" aria-label="Search" autocomplete="off">
      <div id="results" class="results"></div>
    </div>
    <div class="spacer"></div>
    <button class="tb-btn" id="overview-btn" title="War overview">Overview</button>
    <button class="tb-btn" id="world-btn">World at this time</button>
    <button class="tb-btn" id="quiz-btn">Quiz</button>
    <div class="tb-menu">
      <button class="tb-btn" id="layers-btn">Layers ▾</button>
      <div class="menu-pop" id="layers-pop">
        <div class="head">Map layers</div>
        <label><input type="checkbox" data-layer="political" checked> Political world</label>
        <label><input type="checkbox" data-layer="borders" checked> Historical borders</label>
        <label><input type="checkbox" data-layer="cities" checked> Major cities</label>
        <label><input type="checkbox" data-layer="battles" checked> Battles</label>
      </div>
    </div>
    <div class="tb-menu">
      <button class="tb-btn" id="proj-btn">Projection ▾</button>
      <div class="menu-pop" id="proj-pop">
        <div class="head">Projection</div>
        <button class="menu-proj" data-proj="robinson" style="font-weight:600;display:block;width:100%;text-align:left;border:0;background:none;color:var(--ink);padding:6px 8px;border-radius:6px">Robinson</button>
        <button data-proj="winkel" style="display:block;width:100%;text-align:left;border:0;background:none;color:var(--ink);padding:6px 8px;border-radius:6px">Winkel Tripel</button>
        <button data-proj="natural" style="display:block;width:100%;text-align:left;border:0;background:none;color:var(--ink);padding:6px 8px;border-radius:6px">Natural Earth</button>
        <button data-proj="mercator" style="display:block;width:100%;text-align:left;border:0;background:none;color:var(--ink);padding:6px 8px;border-radius:6px">Mercator</button>
        <button data-proj="orthographic" style="display:block;width:100%;text-align:left;border:0;background:none;color:var(--ink);padding:6px 8px;border-radius:6px">Orthographic globe</button>
      </div>
    </div>
  </header>

  <!-- STAGE -->
  <div id="stage">
    <div id="map" role="region" aria-label="Historical map"></div>
    <div class="maptip" id="maptip"></div>
    <div class="hint" id="hint" style="opacity:0">Drag the timeline. Click a country, city, or battle.</div>
    <div class="legend ui" id="legend" aria-live="polite"></div>
    <div class="live-instruction ui" id="live-instruction"></div>
    <div class="zoomctl">
      <button id="reset" title="Reset view">⤢</button>
    </div>

    <!-- WORLD AT THIS TIME -->
    <div id="world" class="ui">
      <div class="wh"><h4 id="world-year">The world at this time</h4><div class="spacer" style="flex:1"></div><button class="icon-btn" id="world-close">✕</button></div>
      <div class="cards" id="world-cards"></div>
    </div>

    <!-- RAIL -->
    <aside id="rail" aria-label="Information panel">
      <div class="rail-head">
        <div style="flex:1">
          <div class="rkind ui" id="rkind">War</div>
          <div class="rtitle" id="rtitle">American Revolutionary War</div>
        </div>
        <button class="icon-btn" id="pin" title="Pin panel">⇤</button>
        <button class="icon-btn" id="railclose" title="Close">✕</button>
      </div>
      <div class="tabs" id="tabs"></div>
      <div class="rail-body" id="railbody"></div>
    </aside>
  </div>

  <!-- TIMELINE -->
  <footer id="timeline" class="ui">
    <div class="yearbig" id="yearbig">1778</div>
    <div class="ctrl">
      <button id="prev" title="Previous year">‹</button>
      <button id="play" title="Play / pause">▶</button>
      <button id="next" title="Next year">›</button>
    </div>
    <div class="tl-track">
      <input type="range" id="yearslider" min="1775" max="1783" value="1778" step="1" aria-label="Year">
      <div class="tl-ticks"><span>1775</span><span>1777</span><span>1779</span><span>1781</span><span>1783</span></div>
    </div>
    <input type="number" id="yearinput" class="yearinput" min="1775" max="1783" value="1778" aria-label="Enter year">
  </footer>

  <!-- QUIZ -->
  <div id="quiz"><div class="quizcard ui" id="quizcard"></div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3-geo-projection/4.0.0/d3-geo-projection.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script src="app/data/american-revolution.js"></script>
<script src="app/engine.js"></script>
<script src="app/app.js"></script>
</body>
</html>
